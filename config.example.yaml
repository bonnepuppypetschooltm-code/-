# config.yaml としてコピーして使用してください(本ファイルはコピー用テンプレート)

# 拠点(犬の幼稚園 bonnepuppey 天満店)の住所
base_address: "大阪府大阪市北区天神橋6丁目 bonnepuppey天満店"

# 車に積めるクレート(それぞれのサイズ「だけ」で満載にした場合の最大数)
# 例: 特大だけなら2個、大だけなら7個、中だけなら9個、小だけなら12個 積める
crate_capacity:
  特大: 2
  大: 7
  中: 9
  小: 12

# カレンダーにクレートサイズの指定がない場合に使うサイズ
default_crate_size: "中"

# 朝の「迎え」便の出発時刻 (拠点発)
morning_start_time: "08:30"

# 夕方の「送り」便の出発時刻 (拠点発)
evening_start_time: "17:00"

# Google カレンダー側の設定
calendar_id: "primary"

# Google API 認証情報ファイルのパス
google_oauth_client_secret_file: "credentials.json"
google_oauth_token_file: "token.json"
