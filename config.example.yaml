# config.yaml としてコピーして使用してください(本ファイルはコピー用テンプレート)

# 拠点(犬の幼稚園 bonnepuppey 天満店)の住所
base_address: "大阪府大阪市北区天神橋4-6-17 上谷ビル1F.2F"

# 車に積めるクレート(それぞれのサイズ「だけ」で満載にした場合の最大数)
# 例: 特大だけなら2個、大だけなら4個、中だけなら9個、小だけなら12個 積める
crate_capacity:
  特大: 2
  大: 4
  中: 9
  小: 12

# カレンダーにクレートサイズの指定がない場合に使うサイズ
default_crate_size: "中"

# 朝の「迎え」便の出発時刻 (拠点発)
# その日のカレンダーに時刻指定のあるお宅がある場合は、
# 「一番早い希望時刻 - departure_buffer_minutes」が自動で使われます。
# 時刻指定のあるお宅が無い日だけ、この時刻が使われます。
morning_start_time: "08:30"

# 夕方の「送り」便の出発時刻 (拠点発、考え方は上と同じ)
evening_start_time: "17:00"

# 時刻指定のあるお宅に間に合うよう、何分前に店舗を出発するか
departure_buffer_minutes: 15

# 「帰着予定」「ここまで/次まで」の計算に使う平均時速 (km/h)
# 出発時刻からの所要時間の目安を計算するために使います
# (実際より早く着くようになっている場合は、この値を下げてください)
avg_speed_kmh: 20

# 実際の道路距離は、地図上の直線距離より長くなります。
# 直線距離の何倍を走行距離とみなすかの係数
# (実際より早く着くようになっている場合は、この値を上げてください)
route_distance_factor: 1.3

# 1軒あたり、お子さんの乗せ降ろしにかかる時間の目安 (分)
stop_minutes: 3

# Google カレンダー側の設定
calendar_id: "primary"

# Google API 認証情報ファイルのパス
google_oauth_client_secret_file: "credentials.json"
google_oauth_token_file: "token.json"
